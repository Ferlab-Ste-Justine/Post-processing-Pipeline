name: "slivar_expr"
description: Filter and/or annotate variants in VCF/BCF format using slivar JavaScript expressions, optionally with a pedigree, regions, exclusion intervals and gnotate annotation files.
keywords:
  - slivar
  - vcf
  - filter
  - annotate
  - variant
  - genomics
  - pedigree
  - expression
tools:
  - "slivar":
      description: "filter/annotate variants in VCF/BCF format with simple expressions."
      homepage: "https://github.com/brentp/slivar"
      documentation: "https://github.com/brentp/slivar/wiki"
      tool_dev_url: "https://github.com/brentp/slivar"
      doi: "10.1038/s41525-021-00227-3"
      licence: ["MIT"]
      identifier: biotools:slivar

input:
  - meta:
      type: map
      description: |
        Groovy Map containing family information
        e.g. [ id:'family1', sequencingType:'WES' ]

  - vcf:
      type: file
      description: VCF file to filter/annotate
      pattern: "*.{vcf,vcf.gz}"

  - tbi:
      type: file
      description: Tabix index for the VCF file
      pattern: "*.{vcf.gz.tbi}"

  - ped:
      type: file
      description: Optional pedigree file describing the family
      pattern: "*.{ped}"

  - regions_bed:
      type: file
      description: Optional BED file restricting evaluation to specific regions
      pattern: "*.{bed,bed.gz}"

  - exclude_bed:
      type: file
      description: Optional BED file of regions to exclude from evaluation
      pattern: "*.{bed,bed.gz}"

  - gnotate_files:
      type: list
      description: Optional list of slivar gnotate (zip) files used to annotate variants with population frequencies or other annotations
      pattern: "*.{zip}"

  - js:
      type: file
      description: Optional JavaScript file containing slivar helper functions used by the expressions
      pattern: "*.{js}"

output:
  - meta:
      type: map
      description: |
        Groovy Map containing family information
        e.g. [ id:'family1', sequencingType:'WES' ]

  - vcf:
      type: file
      description: Filtered/annotated bgzipped VCF produced by slivar expr
      pattern: "*.{vcf.gz}"

  - summary:
      type: file
      description: slivar summary file reporting the number of variants passing each expression
      pattern: "*.slivar.summary.txt"

  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"

authors:
  - "@georgette-femerling"
maintainers:
  - "@georgette-femerling"
