name: "slivar_compoundhets"
description: Identify and tag compound heterozygous variants in a trio/family VCF using slivar compound-hets and a pedigree.
keywords:
  - slivar
  - vcf
  - compound-hets
  - inheritance
  - trio
  - pedigree
  - genomics
  - variant
tools:
  - "slivar":
      description: "filter/annotate variants in VCF/BCF format with simple expressions."
      homepage: "https://github.com/brentp/slivar"
      documentation: "https://github.com/brentp/slivar/wiki"
      tool_dev_url: "https://github.com/brentp/slivar"
      doi: "10.1038/s41525-021-00227-3"
      licence: ["MIT"]
      identifier: biotools:slivar

input:
  - meta:
      type: map
      description: |
        Groovy Map containing family information
        e.g. [ id:'family1', sequencingType:'WES' ]

  - vcf:
      type: file
      description: VCF file (typically already filtered/annotated by slivar expr) in which to call compound heterozygotes
      pattern: "*.{vcf,vcf.gz}"

  - ped:
      type: file
      description: Pedigree file describing the family relationships used to identify compound hets
      pattern: "*.{ped}"

output:
  - meta:
      type: map
      description: |
        Groovy Map containing family information
        e.g. [ id:'family1', sequencingType:'WES' ]

  - vcf:
      type: file
      description: Bgzipped VCF with compound heterozygous variants annotated by slivar
      pattern: "*.{vcf.gz}"

  - tbi:
      type: file
      description: Tabix index for the output VCF
      pattern: "*.{vcf.gz.tbi}"

  - summary:
      type: file
      description: slivar summary file reporting compound-het statistics
      pattern: "*.slivar.summary.txt"

  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"

authors:
  - "@georgette-femerling"
maintainers:
  - "@georgette-femerling"
